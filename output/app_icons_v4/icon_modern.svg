<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="odoBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#222226"/>
    </linearGradient>
    <filter id="odoShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Light background -->
  <rect width="1024" height="1024" fill="#F2F2F7"/>

  <!-- Subtle radial vignette -->
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
    <stop offset="60%" stop-color="white" stop-opacity="0"/>
    <stop offset="100%" stop-color="#E5E5EA" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <!--
    MODERN CAR — sleek crossover/SUV-coupe, facing RIGHT
    =====================================================
    Lower, longer, more angular than the retro version.
    Reference points:
      Rear bumper:    (120, 545)
      Rear axle:      (320, 575)
      C-pillar base:  (290, 460)
      C-pillar top:   (340, 320)
      A-pillar top:   (640, 320)
      A-pillar base:  (700, 460)
      Front axle:     (695, 575)
      Front bumper:   (900, 545)
      Roof:           y=320
      Beltline:       y=460
      Ground:         y=630
  -->

  <!-- Ground shadow -->
  <ellipse cx="510" cy="630" rx="380" ry="16" fill="rgba(0,0,0,0.08)"/>

  <!-- Ground line -->
  <line x1="80" y1="630" x2="944" y2="630" stroke="rgba(0,0,0,0.06)" stroke-width="2" stroke-linecap="round"/>

  <!-- === CAR BODY (lower shell) — modern angular shape === -->
  <path d="
    M 125 548
    C 110 548, 108 530, 115 512
    C 118 500, 125 485, 128 472
    C 138 465, 158 460, 175 458
    L 290 458
    C 288 475, 285 490, 285 505
    A 62 62 0 0 1 347 565
    L 668 565
    A 62 62 0 0 1 730 505
    C 730 492, 728 478, 725 458
    L 875 458
    C 895 458, 908 465, 910 478
    L 912 510
    C 914 534, 904 548, 885 548
    L 125 548
    Z
  " fill="#2DC873" opacity="0.92"/>

  <!-- Body character line (modern sharp crease along lower door) -->
  <path d="M 170 500 L 870 500" stroke="rgba(0,0,0,0.06)" stroke-width="2.5"/>

  <!-- === CABIN (upper body) — lower, sleeker === -->
  <path d="
    M 175 458
    L 290 458
    L 340 320
    L 640 320
    L 700 458
    L 725 458
    L 700 458
    L 640 324
    L 340 324
    L 290 458
  " fill="#2DC873" opacity="0.90"/>

  <!-- === GLASS AREA === -->
  <path d="
    M 300 453
    L 348 330
    L 630 330
    L 680 453
    Z
  " fill="#141418"/>

  <!-- === PILLARS (thinner, sharper — modern look) === -->
  <!-- A-pillar -->
  <polygon points="680,453 700,458 640,320 630,330" fill="#2DC873" opacity="0.88"/>
  <!-- B-pillar (thinner) -->
  <polygon points="490,330 500,330 502,454 490,454" fill="#2DC873" opacity="0.88"/>
  <!-- C-pillar -->
  <polygon points="300,453 290,458 340,320 348,330" fill="#2DC873" opacity="0.88"/>

  <!-- === BELTLINE TRIM (chrome) === -->
  <line x1="173" y1="458" x2="727" y2="458" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- === DOOR CUTS (subtle) === -->
  <line x1="410" y1="380" x2="405" y2="545" stroke="rgba(0,0,0,0.06)" stroke-width="1.8"/>
  <line x1="570" y1="380" x2="575" y2="545" stroke="rgba(0,0,0,0.06)" stroke-width="1.8"/>

  <!-- === FLUSH DOOR HANDLES (modern style) === -->
  <rect x="395" y="420" width="14" height="4" rx="2" fill="rgba(0,0,0,0.10)"/>
  <rect x="585" y="420" width="14" height="4" rx="2" fill="rgba(0,0,0,0.10)"/>

  <!-- === LED HEADLIGHT (slim, modern DRL strip) === -->
  <path d="M 878 490 L 910 490 C 912 490, 912 496, 912 502 L 912 515 L 878 515 Z" fill="rgba(255,255,255,0.50)"/>
  <line x1="880" y1="498" x2="908" y2="498" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- === LED TAILLIGHT (slim light bar) === -->
  <line x1="115" y1="498" x2="150" y2="498" stroke="#FF3B30" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <line x1="115" y1="508" x2="150" y2="508" stroke="#FF3B30" stroke-width="4" stroke-linecap="round" opacity="0.35"/>

  <!-- === FRONT WHEEL (larger, modern low-profile) === -->
  <circle cx="695" cy="575" r="54" fill="#1C1C1E"/>
  <circle cx="695" cy="575" r="40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>
  <circle cx="695" cy="575" r="14" fill="rgba(255,255,255,0.08)"/>
  <!-- Modern 5-spoke design -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="3">
    <line x1="695" y1="539" x2="695" y2="611"/>
    <line x1="661" y1="575" x2="729" y2="575"/>
    <line x1="665" y1="549" x2="707" y2="601"/>
    <line x1="665" y1="601" x2="707" y2="549"/>
    <line x1="671" y1="543" x2="719" y2="607"/>
    <line x1="671" y1="607" x2="719" y2="543"/>
  </g>

  <!-- === REAR WHEEL === -->
  <circle cx="320" cy="575" r="54" fill="#1C1C1E"/>
  <circle cx="320" cy="575" r="40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4"/>
  <circle cx="320" cy="575" r="14" fill="rgba(255,255,255,0.08)"/>
  <g stroke="rgba(255,255,255,0.08)" stroke-width="3">
    <line x1="320" y1="539" x2="320" y2="611"/>
    <line x1="286" y1="575" x2="354" y2="575"/>
    <line x1="290" y1="549" x2="332" y2="601"/>
    <line x1="290" y1="601" x2="332" y2="549"/>
    <line x1="296" y1="543" x2="344" y2="607"/>
    <line x1="296" y1="607" x2="344" y2="543"/>
  </g>

  <!--
    ============================================================
    ODOMETER — same clean style, 8 digits, no comma, no label
    ============================================================
  -->
  <g filter="url(#odoShadow)">
    <!-- Panel -->
    <rect x="262" y="695" width="500" height="130" rx="20" fill="url(#odoBg)"/>
    <rect x="262" y="695" width="500" height="130" rx="20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

    <!-- Display area -->
    <rect x="282" y="708" width="460" height="80" rx="10" fill="#08080A"/>
    <rect x="282" y="708" width="460" height="80" rx="10" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>

    <!-- Accent bar -->
    <rect x="282" y="703" width="460" height="3" rx="1.5" fill="#2DC873" opacity="0.5"/>

    <!-- DIGITS: "00042137" -->
    <g font-family="Menlo, SF Mono, Courier, monospace" font-size="58" font-weight="700" fill="#2DC873" text-anchor="middle">
      <text x="313" y="762">0</text>
      <text x="363" y="762">0</text>
      <text x="413" y="762">0</text>
      <text x="463" y="762">4</text>
      <text x="513" y="762">2</text>
      <text x="563" y="762">1</text>
      <text x="613" y="762">3</text>
      <text x="663" y="762">7</text>
    </g>

    <!-- Digit separators -->
    <g stroke="rgba(45,200,115,0.06)" stroke-width="1">
      <line x1="338" y1="712" x2="338" y2="784"/>
      <line x1="388" y1="712" x2="388" y2="784"/>
      <line x1="438" y1="712" x2="438" y2="784"/>
      <line x1="488" y1="712" x2="488" y2="784"/>
      <line x1="538" y1="712" x2="538" y2="784"/>
      <line x1="588" y1="712" x2="588" y2="784"/>
      <line x1="638" y1="712" x2="638" y2="784"/>
    </g>

    <!-- Center split line -->
    <line x1="285" y1="748" x2="739" y2="748" stroke="rgba(45,200,115,0.04)" stroke-width="1"/>

    <!-- Active dot -->
    <circle cx="470" cy="732" r="4.5" fill="#2DC873" opacity="0.55"/>
  </g>
</svg>
