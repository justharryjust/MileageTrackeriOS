<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="odoBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#222226"/>
    </linearGradient>
    <filter id="odoShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#F2F2F7"/>
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
    <stop offset="60%" stop-color="white" stop-opacity="0"/>
    <stop offset="100%" stop-color="#E5E5EA" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <ellipse cx="510" cy="625" rx="360" ry="14" fill="rgba(0,0,0,0.08)"/>
  <line x1="100" y1="625" x2="924" y2="625" stroke="rgba(0,0,0,0.06)" stroke-width="2" stroke-linecap="round"/>

  <!--
    UNIFIED CAR BODY — one continuous green path
    Includes wheel arch cutouts so there are no gaps or hacks.
  -->
  <path d="
    M 154 545
    C 142 545, 138 530, 143 512
    L 155 470
    C 160 460, 168 458, 178 458
    L 203 458
    L 310 458
    L 365 345
    L 605 345
    L 660 458
    L 860 458
    C 878 458, 888 465, 890 478
    L 892 510
    C 894 532, 886 545, 868 545
    L 718 545
    A 70 70 0 0 1 650 545
    L 375 545
    A 70 70 0 0 1 307 545
    L 154 545
    Z
  " fill="#2DC873"/>

  <!-- Glass -->
  <path d="M 320 457 L 372 355 L 598 355 L 650 457 Z" fill="#1C1C20"/>

  <!-- Pillars -->
  <polygon points="650,457 660,458 605,345 598,355" fill="#2DC873"/>
  <polygon points="485,355 500,355 502,458 487,458" fill="#2DC873"/>
  <polygon points="320,457 310,458 365,345 372,355" fill="#2DC873"/>

  <!-- Beltline -->
  <line x1="176" y1="458" x2="862" y2="458" stroke="rgba(0,0,0,0.08)" stroke-width="2"/>

  <!-- Door cuts -->
  <line x1="435" y1="375" x2="430" y2="548" stroke="rgba(0,0,0,0.05)" stroke-width="2"/>
  <line x1="550" y1="375" x2="555" y2="548" stroke="rgba(0,0,0,0.05)" stroke-width="2"/>

  <!-- Door handles -->
  <rect x="415" y="418" width="24" height="5" rx="2.5" fill="rgba(0,0,0,0.10)"/>
  <rect x="568" y="418" width="24" height="5" rx="2.5" fill="rgba(0,0,0,0.10)"/>

  <!-- Headlight -->
  <path d="M 862 492 L 888 492 C 892 492, 892 498, 892 505 L 892 515 L 862 515 Z" fill="#FFF9C4"/>
  <circle cx="880" cy="503" r="3" fill="#FFFFFF"/>

  <!-- Taillight -->
  <path d="M 148 492 L 174 492 L 174 515 L 151 515 C 146 515, 146 498, 148 492 Z" fill="#CC2222"/>
  <circle cx="164" cy="503" r="2.5" fill="#FF4444"/>

  <!-- Bumper overrider -->
  <rect x="865" y="515" width="20" height="10" rx="2" fill="#1F9955"/>

  <!-- === WHEELS — clean: tire, one rim ring, hub === -->
  <!-- Front wheel -->
  <circle cx="680" cy="570" r="52" fill="#111114"/>
  <circle cx="680" cy="570" r="32" fill="none" stroke="#2D2D30" stroke-width="4"/>
  <circle cx="680" cy="570" r="10" fill="#2D2D30"/>

  <!-- Rear wheel -->
  <circle cx="335" cy="570" r="52" fill="#111114"/>
  <circle cx="335" cy="570" r="32" fill="none" stroke="#2D2D30" stroke-width="4"/>
  <circle cx="335" cy="570" r="10" fill="#2D2D30"/>

  <!--
    ODOMETER — digits centered, shifted down, no stray details
  -->
  <g filter="url(#odoShadow)">
    <rect x="237" y="705" width="550" height="140" rx="20" fill="url(#odoBg)"/>
    <rect x="237" y="705" width="550" height="140" rx="20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

    <rect x="257" y="718" width="510" height="90" rx="10" fill="#08080A"/>
    <rect x="257" y="718" width="510" height="90" rx="10" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>

    <rect x="257" y="713" width="510" height="3" rx="1.5" fill="#2DC873" opacity="0.45"/>

    <!-- 9 digits centered in 510px display (257 to 767, center 512) -->
    <!-- Span: 9 digits × 54px gap = 432px. Start = 512 - 216 = 296 -->
    <g font-family="Menlo, SF Mono, Courier, monospace" font-size="60" font-weight="700" fill="#2DC873" text-anchor="middle">
      <text x="296" y="776">0</text>
      <text x="350" y="776">0</text>
      <text x="404" y="776">0</text>
      <text x="458" y="776">0</text>
      <text x="512" y="776">4</text>
      <text x="566" y="776">2</text>
      <text x="620" y="776">1</text>
      <text x="674" y="776">3</text>
      <text x="728" y="776">7</text>
    </g>

    <g stroke="rgba(45,200,115,0.06)" stroke-width="1">
      <line x1="323" y1="722" x2="323" y2="804"/>
      <line x1="377" y1="722" x2="377" y2="804"/>
      <line x1="431" y1="722" x2="431" y2="804"/>
      <line x1="485" y1="722" x2="485" y2="804"/>
      <line x1="539" y1="722" x2="539" y2="804"/>
      <line x1="593" y1="722" x2="593" y2="804"/>
      <line x1="647" y1="722" x2="647" y2="804"/>
      <line x1="701" y1="722" x2="701" y2="804"/>
    </g>
  </g>
</svg>
