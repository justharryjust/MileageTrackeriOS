<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DC873"/>
      <stop offset="100%" stop-color="#1B8A4A"/>
    </linearGradient>
    <linearGradient id="odoBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18181A"/>
      <stop offset="100%" stop-color="#28282C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!--
    CAR — side view, facing RIGHT
    ==============================
    Reference points (x, y):
    - Rear bumper:    (160, 540)
    - Rear axle:      (340, 570)
    - C-pillar base:  (320, 465)
    - C-pillar top:   (375, 300)
    - A-pillar top:   (615, 300)
    - A-pillar base:  (670, 465)
    - Front axle:     (690, 570)
    - Front bumper:   (870, 540)
    - Beltline:       y=465
    - Roof:           y=300
    - Ground:         y=625
  -->

  <!-- Ground shadow -->
  <ellipse cx="515" cy="625" rx="360" ry="16" fill="rgba(0,0,0,0.22)"/>

  <!-- GROUND LINE -->
  <line x1="100" y1="625" x2="924" y2="625" stroke="rgba(255,255,255,0.12)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- === CAR BODY (main lower shape) === -->
  <path d="
    M 160 545
    C 148 545, 145 530, 150 512
    C 153 498, 158 482, 162 470
    C 175 465, 195 463, 210 462
    L 320 462
    C 318 478, 316 490, 316 505
    A 66 66 0 0 1 382 566
    L 648 566
    A 66 66 0 0 1 714 505
    C 714 492, 712 478, 710 462
    L 860 462
    C 878 462, 888 468, 890 482
    L 892 510
    C 894 532, 885 545, 868 545
    L 160 545
    Z
  " fill="white" opacity="0.90"/>

  <!-- === CABIN / UPPER BODY === -->
  <path d="
    M 210 462
    L 320 462
    L 375 300
    L 615 300
    L 670 462
    L 860 462
    L 710 462
    L 670 462
    L 615 304
    L 375 304
    L 320 462
  " fill="white" opacity="0.85"/>

  <!-- === GLASS AREA (dark, between pillars) === -->
  <path d="
    M 330 457
    L 382 310
    L 608 310
    L 660 457
    Z
  " fill="#151518"/>

  <!-- === PILLARS === -->
  <!-- A-pillar (front windshield frame) -->
  <polygon points="660,457 670,462 615,300 608,310" fill="white" opacity="0.82"/>
  <!-- B-pillar (between front/rear doors) -->
  <polygon points="495,310 510,310 512,458 497,458" fill="white" opacity="0.82"/>
  <!-- C-pillar (rear window frame) -->
  <polygon points="330,457 320,462 375,300 382,310" fill="white" opacity="0.82"/>

  <!-- === BELTLINE TRIM === -->
  <line x1="208" y1="462" x2="862" y2="462" stroke="rgba(0,0,0,0.10)" stroke-width="2.5"/>

  <!-- === DOOR CUT LINES === -->
  <line x1="440" y1="370" x2="435" y2="540" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>
  <line x1="555" y1="370" x2="560" y2="540" stroke="rgba(0,0,0,0.10)" stroke-width="2"/>

  <!-- === DOOR HANDLES === -->
  <rect x="420" y="410" width="26" height="6" rx="3" fill="rgba(0,0,0,0.15)"/>
  <rect x="570" y="410" width="26" height="6" rx="3" fill="rgba(0,0,0,0.15)"/>

  <!-- === HEADLIGHT (front, right) === -->
  <path d="M 862 492 L 888 492 C 892 492, 892 498, 892 505 L 892 515 L 862 515 Z" fill="rgba(255,255,255,0.40)"/>
  <circle cx="880" cy="503" r="3.5" fill="white" opacity="0.7"/>

  <!-- === TAILLIGHT (rear, left) === -->
  <path d="M 152 492 L 178 492 L 178 515 L 155 515 C 150 515, 150 498, 152 492 Z" fill="#FF3B30" opacity="0.50"/>
  <circle cx="168" cy="503" r="3" fill="#FF3B30" opacity="0.7"/>

  <!-- === FRONT WHEEL === -->
  <circle cx="690" cy="570" r="52" fill="#1C1C1E"/>
  <circle cx="690" cy="570" r="34" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5"/>
  <circle cx="690" cy="570" r="12" fill="rgba(255,255,255,0.10)"/>
  <g stroke="rgba(255,255,255,0.10)" stroke-width="2.5">
    <line x1="690" y1="540" x2="690" y2="600"/>
    <line x1="660" y1="570" x2="720" y2="570"/>
    <line x1="668" y1="548" x2="712" y2="592"/>
    <line x1="668" y1="592" x2="712" y2="548"/>
  </g>

  <!-- === REAR WHEEL === -->
  <circle cx="340" cy="570" r="52" fill="#1C1C1E"/>
  <circle cx="340" cy="570" r="34" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5"/>
  <circle cx="340" cy="570" r="12" fill="rgba(255,255,255,0.10)"/>
  <g stroke="rgba(255,255,255,0.10)" stroke-width="2.5">
    <line x1="340" y1="540" x2="340" y2="600"/>
    <line x1="310" y1="570" x2="370" y2="570"/>
    <line x1="318" y1="548" x2="362" y2="592"/>
    <line x1="318" y1="592" x2="362" y2="548"/>
  </g>

  <!--
    ============================================================
    ODOMETER DISPLAY — dashboard instrument cluster overlay
    Shows cumulative distance (not speed) as rolling digit wheels
    ============================================================
  -->
  <g filter="url(#shadow)">
    <!-- Panel body -->
    <rect x="287" y="665" width="450" height="170" rx="24" fill="url(#odoBg)"/>
    <rect x="287" y="665" width="450" height="170" rx="24" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

    <!-- Inner display (screen area) -->
    <rect x="307" y="681" width="410" height="90" rx="10" fill="#0A0A0C"/>
    <rect x="307" y="681" width="410" height="90" rx="10" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>

    <!-- Green accent bar (top of panel) -->
    <rect x="307" y="676" width="410" height="3" rx="1.5" fill="#2DC873" opacity="0.55"/>

    <!-- ODOMETER DIGITS: "042,137" -->
    <!-- Each digit is a mechanical rolling counter wheel -->
    <g font-family="Menlo, SF Mono, Courier, monospace" font-size="64" font-weight="700" fill="#2DC873" text-anchor="middle">
      <text x="340" y="749">0</text>
      <text x="390" y="749">4</text>
      <text x="440" y="749">2</text>
      <!-- Comma -->
      <text x="482" y="749" fill="#2DC873" opacity="0.35">,</text>
      <text x="510" y="749">1</text>
      <text x="560" y="749">3</text>
      <text x="610" y="749">7</text>
    </g>

    <!-- Vertical separators between digit positions -->
    <g stroke="rgba(45,200,115,0.07)" stroke-width="1">
      <line x1="365" y1="684" x2="365" y2="767"/>
      <line x1="415" y1="684" x2="415" y2="767"/>
      <line x1="465" y1="684" x2="465" y2="767"/>
      <line x1="535" y1="684" x2="535" y2="767"/>
      <line x1="585" y1="684" x2="585" y2="767"/>
    </g>

    <!-- Rolling wheel center line (mechanical odometer detail) -->
    <line x1="310" y1="726" x2="714" y2="726" stroke="rgba(45,200,115,0.05)" stroke-width="1"/>

    <!-- Label -->
    <text x="512" y="808" fill="white" font-family="-apple-system, SF Pro Display, sans-serif"
          font-size="19" font-weight="500" text-anchor="middle" opacity="0.40" letter-spacing="4">TOTAL KILOMETRES</text>

    <!-- Small green recording/active dot -->
    <circle cx="484" cy="710" r="5" fill="#2DC873" opacity="0.6"/>
  </g>

</svg>
