name: QA Agent

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_url:
        description: 'PR URL to review'
        required: true

jobs:
  qa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build project
        run: |
          xcodebuild -project MileageTrackeriOS.xcodeproj \
            -scheme MileageTrackeriOS \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            build
      - name: Run tests
        run: |
          xcodebuild -project MileageTrackeriOS.xcodeproj \
            -scheme MileageTrackeriOS \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            test
      - name: Run QA Agent (review + merge decision)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.QA_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url || inputs.pr_url }}
        run: node .github/scripts/run-agent.js qa
