name: Developer Agent

on:
  project_v2_item:
    types: [edited]
  workflow_dispatch:
    inputs:
      issue_url:
        description: 'Issue URL to implement'
        required: true

jobs:
  develop:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.projects_v2_item && github.event.changes.field_value.name == 'Status' && github.event.projects_v2_item.content_type == 'Issue')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Run Developer Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.DEVELOPER_PAT }}
          ISSUE_URL: ${{ inputs.issue_url }}
        run: node .github/scripts/run-agent.js developer
